repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=5000"] # Fails the commit if you accidentally try to push a file over 5MB

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff is an ultra-fast Rust-based linter that replaces Flake8, Black, and isort
    rev: v0.1.7
    hooks:
      - id: ruff
        args: [--fix] # Automatically fix minor linting errors
      - id: ruff-format # Automatically format the code

  - repo: https://github.com/pre-commit/mirrors-mypy
    # MyPy enforces static type hints across the Slow Loop
    rev: v1.7.1
    hooks:
      - id: mypy
        # We ignore missing imports because MyPy cannot statically analyze the compiled C++ `cpp_core` module
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic>=2.5.2
